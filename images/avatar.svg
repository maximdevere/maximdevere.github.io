<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3d7194;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#235777;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景矩形 -->
  <rect x="30" y="30" width="140" height="140" rx="15" ry="15" fill="url(#grad)" />
  
  <!-- 前景图标 - 类似于照片中的"XO"图标 -->
  <path d="M70,70 L90,90 M90,70 L70,90" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
  
  <!-- 内部边框 -->
  <rect x="60" y="60" width="40" height="40" rx="5" ry="5" fill="none" stroke="#ffffff" stroke-width="4" />
  
  <!-- 右侧标记 -->
  <rect x="120" y="70" width="20" height="5" rx="2" ry="2" fill="#ffffff" />
  <rect x="120" y="85" width="15" height="5" rx="2" ry="2" fill="#ffffff" />
  <rect x="120" y="100" width="25" height="5" rx="2" ry="2" fill="#ffffff" />
  
  <!-- 底部装饰元素 -->
  <rect x="60" y="120" width="80" height="5" rx="2" ry="2" fill="#ffffff" opacity="0.7" />
  <rect x="70" y="135" width="60" height="5" rx="2" ry="2" fill="#ffffff" opacity="0.5" />
</svg> 