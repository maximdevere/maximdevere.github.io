<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 圆形背景 -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#A0A59E" stroke-width="4"/>
  
  <!-- 内部XO脸 -->
  <rect x="40" y="40" width="120" height="120" rx="15" ry="15" 
        fill="none" stroke="#A0A59E" stroke-width="6"/>
  
  <!-- 左眼 (X) -->
  <line x1="70" y1="70" x2="90" y2="90" stroke="#A0A59E" stroke-width="6" stroke-linecap="round"/>
  <line x1="90" y1="70" x2="70" y2="90" stroke="#A0A59E" stroke-width="6" stroke-linecap="round"/>
  
  <!-- 右眼 (O) -->
  <circle cx="120" cy="80" r="15" fill="none" stroke="#A0A59E" stroke-width="6"/>
  
  <!-- 悲伤的嘴巴 -->
  <path d="M70 130 Q100 110 130 130" fill="none" stroke="#A0A59E" stroke-width="6" stroke-linecap="round"/>
</svg> 