<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3d7194;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#235777;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- 主图形 - 方形图标 -->
  <rect x="50" y="50" width="200" height="200" rx="25" ry="25" fill="url(#gradIcon)" />
  
  <!-- X标记 -->
  <path d="M100,100 L150,150 M150,100 L100,150" stroke="#ffffff" stroke-width="12" stroke-linecap="round" />
  
  <!-- 内部边框 -->
  <rect x="85" y="85" width="80" height="80" rx="10" ry="10" fill="none" stroke="#ffffff" stroke-width="6" />
  
  <!-- 右侧标记 -->
  <rect x="190" y="100" width="30" height="8" rx="3" ry="3" fill="#ffffff" />
  <rect x="190" y="125" width="25" height="8" rx="3" ry="3" fill="#ffffff" />
  <rect x="190" y="150" width="35" height="8" rx="3" ry="3" fill="#ffffff" />
  
  <!-- 底部装饰元素 -->
  <rect x="85" y="190" width="130" height="8" rx="3" ry="3" fill="#ffffff" opacity="0.7" />
  <rect x="100" y="215" width="100" height="8" rx="3" ry="3" fill="#ffffff" opacity="0.5" />
</svg> 