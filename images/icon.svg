<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect x="0" y="0" width="300" height="300" fill="#1A1C22"/>
  
  <!-- Rounded rectangle border -->
  <rect x="30" y="30" width="240" height="240" rx="30" ry="30" 
        fill="none" stroke="#A0A59E" stroke-width="12"/>
  
  <!-- Left eye (X) -->
  <line x1="90" y1="90" x2="130" y2="130" stroke="#A0A59E" stroke-width="12" stroke-linecap="round"/>
  <line x1="130" y1="90" x2="90" y2="130" stroke="#A0A59E" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Right eye (O) -->
  <circle cx="195" cy="110" r="30" fill="none" stroke="#A0A59E" stroke-width="12"/>
  
  <!-- Sad mouth -->
  <path d="M105 200 Q150 160 195 200" fill="none" stroke="#A0A59E" stroke-width="12" stroke-linecap="round"/>
</svg> 